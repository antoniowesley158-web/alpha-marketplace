<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Marketplace</title>

<!-- Fontes gamer -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>
/* Reset e corpo */
body { margin:0; font-family:'Roboto', sans-serif; background:#0a0a0a; color:#fff; overflow-x:hidden; transition: background 0.3s; }
h1,h2,h3,h4,h5,h6 { font-family:'Orbitron', sans-serif; color:#0ff; text-shadow:0 0 8px #0ff; }

/* Fundo animado de partículas */
#fundo-animado { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; background:linear-gradient(120deg,#0a0a0a,#111); overflow:hidden; }
.particula { position:absolute; border-radius:50%; background:#0ff; opacity:0.5; }

/* Header */
header { display:flex; justify-content:space-between; align-items:center; padding:15px 20px; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); position:relative; z-index:100; }
#logo { width:60px; }
#menu-header { display:flex; gap:10px; align-items:center; }
button { background:transparent; border:2px solid #0ff; color:#0ff; padding:10px 20px; border-radius:6px; cursor:pointer; transition:0.3s; text-transform:uppercase; font-weight:500; }
button:hover { background:#0ff; color:#000; box-shadow:0 0 12px #0ff, 0 0 20px #0ff inset; }

/* Formulário cadastro lojista */
#form-cadastro { max-width:400px; margin:50px auto; padding:20px; background:rgba(20,20,20,0.8); border-radius:10px; box-shadow:0 0 15px #0ff; display:none; }
#form-cadastro input, #form-cadastro textarea { width:100%; margin-bottom:10px; padding:10px; border-radius:5px; border:none; background:#111; color:#fff; }
#form-cadastro label { display:block; margin-bottom:5px; color:#0ff; }

/* Banner inicial */
.hero { text-align:center; padding:150px 20px; }
.hero h1 { font-size:3em; }
.hero p { font-size:1.2em; margin:15px 0; }

/* Avisos animados */
#aviso { position:fixed; top:20px; right:20px; background:#0ff; color:#000; padding:15px 25px; border-radius:8px; display:none; animation:fadeInOut 2.5s ease forwards; font-weight:bold; }
@keyframes fadeInOut { 0%{opacity:0; transform:translateY(-20px);} 10%,90%{opacity:1; transform:translateY(0);} 100%{opacity:0; transform:translateY(-20px);} }
</style>
</head>

<body>

<div id="fundo-animado"></div>

<header>
  <div id="logo-container"><img id="logo" src="https://i.ibb.co/yhhnR8x/lobo.png" alt="Logo"></div>
  <div id="menu-header">
    <button id="login-google">Login Google</button>
    <button id="abrir-form-cadastro">Criar Loja</button>
  </div>
</header>

<!-- Banner inicial -->
<div class="hero">
  <h1>Alpha Marketplace</h1>
  <p>Crie sua loja gamer com estilo profissional!</p>
  <button id="começar-loja">Começar Agora →</button>
</div>

<!-- Formulário cadastro lojista -->
<div id="form-cadastro">
  <h3>Cadastro da Loja</h3>
  <label>Nome da Loja</label>
  <input type="text" id="nome-loja">
  <label>Descrição da Loja</label>
  <textarea id="desc-loja"></textarea>
  <label>Email de contato</label>
  <input type="email" id="email-loja">
  <button id="salvar-loja">Salvar Loja</button>
</div>

<!-- Aviso animado -->
<div id="aviso"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "COLOQUE_SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO",
  storageBucket: "SEU_PROJETO.appspot.com",
  messagingSenderId: "SEU_PROJETO",
  appId: "SEU_PROJETO"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// Login Google
document.getElementById('login-google').onclick = async () => {
  try{
    const result = await signInWithPopup(auth, provider);
    mostrarAviso(`Bem-vindo ${result.user.displayName}`);
  } catch(e){ mostrarAviso('Erro ao logar'); }
}

// Formulário cadastro
document.getElementById('abrir-form-cadastro').onclick = ()=> {
  document.getElementById('form-cadastro').style.display='block';
}

document.getElementById('salvar-loja').onclick = async () => {
  const nome = document.getElementById('nome-loja').value;
  const desc = document.getElementById('desc-loja').value;
  const email = document.getElementById('email-loja').value;
  const user = auth.currentUser;
  if(!user){ mostrarAviso('Faça login primeiro'); return; }
  if(!nome || !desc){ mostrarAviso('Preencha todos os campos'); return; }

  const lojaRef = doc(db, "lojas", user.uid);
  await setDoc(lojaRef, {nomeLoja:nome, descricao:desc, emailContato:email});
  mostrarAviso('Loja criada com sucesso!');
  document.getElementById('form-cadastro').style.display='none';
}

// Avisos animados
function mostrarAviso(msg){
  const aviso = document.getElementById('aviso');
  aviso.innerText = msg;
  aviso.style.display='block';
  setTimeout(()=>{ aviso.style.display='none'; },2500);
}

// Fundo animado simples
const fundo = document.getElementById('fundo-animado');
for(let i=0;i<50;i++){
  const p = document.createElement('div'); p.className='particula';
  p.style.width = p.style.height = Math.random()*5+2+'px';
  p.style.top = Math.random()*100+'%';
  p.style.left = Math.random()*100+'%';
  fundo.appendChild(p);
}
</script>

</body>
</html>
