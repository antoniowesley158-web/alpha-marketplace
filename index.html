<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Marketplace</title>
<style>
  body {
    font-family: sans-serif;
    margin:0;
    padding:0;
    background-size: cover;
    background-position: center;
    transition: background 0.5s ease-in-out;
  }
  .container { 
    background: rgba(255,255,255,0.95); 
    padding: 20px; 
    border-radius: 10px; 
    box-shadow: 0 0 15px rgba(0,0,0,0.2); 
    width: 90%; max-width: 400px; 
    margin: 20px auto;
    opacity:0; animation: fadeIn 0.5s forwards;
  }
  input, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; transition: all 0.3s; }
  button { border:none; background:#2e86de; color:#fff; font-weight:bold; cursor:pointer; }
  button:hover { background:#2164a3; transform: scale(1.05); }
  .link { text-align:center; margin-top:10px; cursor:pointer; color:#2e86de; }
  #app { display:none; text-align:center; }
  #lista-produtos div, #lista-carrinho div, #lista-pedidos div { margin:5px 0; padding:5px; border-bottom:1px solid #ccc; opacity:0; animation: fadeIn 0.5s forwards; }
  #lista-produtos button, #lista-carrinho button { width:auto; padding:5px; margin-left:5px; }
  @keyframes fadeIn { from {opacity:0; transform: translateY(10px);} to {opacity:1; transform: translateY(0);} }
  .logo { width:120px; margin:10px auto; display:block; transition: transform 0.5s ease; }
  .logo:hover { transform: scale(1.1); }
  .tab { display:none; margin-top:10px; transition: all 0.5s; }
  .tab.active { display:block; animation: fadeIn 0.5s forwards; }
</style>
</head>
<body id="body">

<!-- Logo -->
<img src="https://via.placeholder.com/120x50?text=Logo" class="logo" id="logo">

<!-- Login -->
<div class="container" id="login-container">
  <h2>Login</h2>
  <input type="email" id="login-email" placeholder="Email">
  <input type="password" id="login-password" placeholder="Senha">
  <button id="login-btn">Entrar</button>
  <button id="login-google-btn" style="background:#db4437;">Entrar com Google</button>
  <div class="link" id="show-register">Não tem conta? Cadastre-se</div>
</div>

<!-- Cadastro -->
<div class="container" id="register-container" style="display:none;">
  <h2>Cadastro</h2>
  <input type="text" id="register-name" placeholder="Nome">
  <input type="email" id="register-email" placeholder="Email">
  <input type="password" id="register-password" placeholder="Senha">
  <button id="register-btn">Cadastrar</button>
  <div class="link" id="show-login">Já tem conta? Login</div>
</div>

<!-- Área do app -->
<div id="app">
  <h2>Bem-vindo!</h2>
  <button id="logout-btn">Sair</button>

  <!-- Abas -->
  <div style="margin-top:20px;">
    <button onclick="showTab('produtos')">Produtos</button>
    <button onclick="showTab('carrinho')">Carrinho</button>
    <button onclick="showTab('meusPedidos')">Meus Pedidos</button>
    <button onclick="showTab('admin')" id="admin-btn" style="background:#27ae60;">Painel do Dono</button>
  </div>

  <!-- Conteúdos -->
  <div id="produtos" class="tab">
    <h3>Produtos</h3>
    <div id="lista-produtos"></div>
    <input type="text" id="novo-produto" placeholder="Nome do produto">
    <input type="number" id="novo-preco" placeholder="Preço">
    <button id="add-produto-btn">Adicionar Produto</button>
  </div>

  <div id="carrinho" class="tab">
    <h3>Carrinho</h3>
    <div id="lista-carrinho"></div>
    <button id="finalizar-pedido-btn">Finalizar Pedido</button>
  </div>

  <div id="meusPedidos" class="tab">
    <h3>Seus pedidos</h3>
    <div id="lista-pedidos">Carregando pedidos...</div>
  </div>

  <!-- Painel do dono -->
  <div id="admin" class="tab">
    <h3>Painel do Dono</h3>
    <input type="text" id="novo-logo" placeholder="URL da logo">
    <input type="text" id="novo-fundo" placeholder="URL da foto de fundo">
    <button id="salvar-admin-btn" style="background:#27ae60;">Salvar Alterações</button>
  </div>
</div>

<!-- Firebase Scripts v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyAkooYQtwZa3ijKAu8Zl8iNV3vedf3oplI",
  authDomain: "alpha-marketplace-a5bee.firebaseapp.com",
  projectId: "alpha-marketplace-a5bee",
  storageBucket: "alpha-marketplace-a5bee.appspot.com",
  messagingSenderId: "633576067411",
  appId: "1:633576067411:web:f837cc956a21d02954d1a6"
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.firestore();

const loginContainer = document.getElementById('login-container');
const registerContainer = document.getElementById('register-container');
const appDiv = document.getElementById('app');

document.getElementById('show-register').onclick = () => { loginContainer.style.display='none'; registerContainer.style.display='block'; }
document.getElementById('show-login').onclick = () => { registerContainer.style.display='none'; loginContainer.style.display='block'; }

// Cadastro
document.getElementById('register-btn').onclick = () => {
  const name = document.getElementById('register-name').value;
  const email = document.getElementById('register-email').value;
  const password = document.getElementById('register-password').value;
  auth.createUserWithEmailAndPassword(email,password)
    .then(cred => {
      db.collection('users').doc(cred.user.uid).set({name:name,email:email,role:'user'});
      alert('Cadastro feito!');
      registerContainer.style.display='none';
      appDiv.style.display='block';
      showTab('produtos');
      carregarProdutos();
    }).catch(err=>alert(err.message));
}

// Login Email/Senha
document.getElementById('login-btn').onclick = () => {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  auth.signInWithEmailAndPassword(email,password)
    .then(() => {
      loginContainer.style.display='none';
      appDiv.style.display='block';
      carregarProdutos();
    }).catch(err=>alert(err.message));
}

// Login Google
document.getElementById('login-google-btn').onclick = () => {
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .then(result => {
      var user = result.user;
      db.collection('users').doc(user.uid).set({
        name: user.displayName,
        email: user.email,
        role:'user'
      }, {merge:true});
      loginContainer.style.display='none';
      registerContainer.style.display='none';
      appDiv.style.display='block';
      carregarProdutos();
    }).catch(err=>alert(err.message));
}

// Logout
document.getElementById('logout-btn').onclick = () => {
  auth.signOut().then(()=>{
    appDiv.style.display='none';
    loginContainer.style.display='block';
    carrinho = [];
    renderCarrinho();
  });
}

// Mantém usuário logado
auth.onAuthStateChanged(user=>{
  if(user){
    appDiv.style.display='block';
    loginContainer.style.display='none';
    registerContainer.style.display='none';
    carregarProdutos();
    renderCarrinho();
    carregarPedidos();
    checkAdmin(user);
  }
});

function showTab(tab){
  ['produtos','carrinho','meusPedidos','admin'].forEach(t=>{
    document.getElementById(t).classList.remove('active');
  });
  document.getElementById(tab).classList.add('active');
}

// Produtos
document.getElementById('add-produto-btn').onclick = () => {
  const nome = document.getElementById('novo-produto').value;
  const preco = parseFloat(document.getElementById('novo-preco').value);
  if(!nome||!preco) return alert('Preencha nome e preço');
  db.collection('produtos').add({nome:nome,preco:preco})
    .then(()=>{
      document.getElementById('novo-produto').value='';
      document.getElementById('novo-preco').value='';
      carregarProdutos();
    });
}

function carregarProdutos(){
  const lista = document.getElementById('lista-produtos');
  lista.innerHTML='';
  db.collection('produtos').get().then(snapshot=>{
    snapshot.forEach(doc=>{
      const produto = doc.data();
      const btn = `<button onclick="adicionarCarrinho('${doc.id}','${produto.nome}',${produto.preco})">Adicionar</button>`;
      lista.innerHTML+=`<div>${produto.nome} - R$${produto.preco.toFixed(2)} ${btn}</div>`;
    });
  });
}

// Carrinho
let carrinho=[];
function adicionarCarrinho(id,nome,preco){
  carrinho.push({id,nome,preco});
  renderCarrinho();
}
function renderCarrinho(){
  const lista=document.getElementById('lista-carrinho');
  lista.innerHTML='';
  carrinho.forEach((item,i)=>{
    lista.innerHTML+=`<div>${item.nome} - R$${item.preco.toFixed(2)} <button onclick="removerCarrinho(${i})">X</button></div>`;
  });
}
function removerCarrinho(i){carrinho.splice(i,1);renderCarrinho();}

// Finalizar pedido
document.getElementById('finalizar-pedido-btn').onclick = async()=>{
  const user = auth.currentUser;
  if(!user) return alert('Precisa logar');
  if(carrinho.length===0) return alert('Carrinho vazio');
  const itensPedidos = carrinho.map(i=>({id:i.id,nome:i.nome,preco:i.preco}));
  await db.collection('pedidos').add({
    userId:user.uid,
    itens:itensPedidos,
    data:firebase.firestore.FieldValue.serverTimestamp()
  });
  alert('Pedido finalizado!');
  carrinho=[];
  renderCarrinho();
  carregarPedidos();
  showTab('meusPedidos');
}

// Carregar pedidos
async function carregarPedidos(){
  const lista = document.getElementById('lista-pedidos');
  lista.innerHTML='Carregando pedidos...';
  const user = auth.currentUser;
  if(!user) return;
  try{
    const snapshot = await db.collection('pedidos')
      .where('userId','==',user.uid)
      .get();
    lista.innerHTML='';
    snapshot.forEach(doc=>{
      const pedido = doc.data();
      if(pedido.itens && pedido.itens.length>0){
        const itens = pedido.itens.map(i=>`${i.nome} R$${i.preco.toFixed(2)}`).join(', ');
        lista.innerHTML+=`<div>${itens}</div>`;
      }
    });
    if(lista.innerHTML==='') lista.innerHTML='Nenhum pedido';
  }catch(err){alert('Erro ao carregar pedidos: '+err.message);}
}

// Painel do dono
function checkAdmin(user){
  db.collection('users').doc(user.uid).get().then(doc=>{
    if(doc.exists && doc.data().role==='admin'){
      document.getElementById('admin-btn').style.display='inline-block';
    }else{
      document.getElementById('admin-btn').style.display='none';
    }
  });
}

document.getElementById('salvar-admin-btn').onclick=()=>{
  const logoUrl=document.getElementById('novo-logo').value;
  const fundoUrl=document.getElementById('novo-fundo').value;
  db.collection('admin').doc('config').set({
    logo:logoUrl,
    fundo:fundoUrl
  },{merge:true}).then(()=>{
    document.getElementById('logo').src=logoUrl;
    document.getElementById('body').style.background=`url(${fundoUrl}) no-repeat center center/cover`;
    alert('Alterações salvas!');
  });
}

// Carregar config do admin
db.collection('admin').doc('config').get().then(doc=>{
  if(doc.exists){
    const data=doc.data();
    if(data.logo) document.getElementById('logo').src=data.logo;
    if(data.fundo) document.getElementById('body').style.background=`url(${data.fundo}) no-repeat center center/cover`;
  }
});
</script>
</body>
  </html>
